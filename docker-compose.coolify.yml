# Docker Compose for Coolify deployments.
#
# This file joins Coolify's predefined internal network and intentionally does
# not publish host ports. Expose port 8080 in Coolify's domain/proxy settings
# and access the service internally as:
#
#   http://searxng:8080

name: searxng

services:
  searxng-config:
    image: ghcr.io/searxng/searxng:${SEARXNG_VERSION:-latest}
    restart: "no"
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -eu
        if [ ! -f /config/settings.yml ]; then
          cp /usr/local/searxng/searx/settings.yml /config/settings.yml
        fi
        if [ ! -f /config/limiter.toml ]; then
          cp /usr/local/searxng/searx/limiter.toml /config/limiter.toml
        fi
        awk '
          !done && $$0 == "  formats:" {
            print
            print "    - html"
            print "    - csv"
            print "    - json"
            print "    - rss"
            done = 1
            skip = 1
            next
          }
          skip && $$0 ~ /^    - / { next }
          { skip = 0; print }
        ' /config/settings.yml > /config/settings.yml.tmp
        mv /config/settings.yml.tmp /config/settings.yml
        awk '
          !done && $$0 == "trusted_proxies = [" {
            print
            print "  '\''127.0.0.0/8'\'',"
            print "  '\''::1'\'',"
            print "  '\''10.0.0.0/8'\'',"
            print "  '\''172.16.0.0/12'\'',"
            print "  '\''192.168.0.0/16'\'',"
            print "  '\''fd00::/8'\'',"
            print "]"
            done = 1
            skip = 1
            next
          }
          skip && $$0 != "]" { next }
          skip && $$0 == "]" { skip = 0; next }
          { print }
        ' /config/limiter.toml > /config/limiter.toml.tmp
        mv /config/limiter.toml.tmp /config/limiter.toml
    volumes:
      - searxng-config:/config
    networks:
      - coolify

  searxng:
    image: ghcr.io/searxng/searxng:${SEARXNG_VERSION:-latest}
    restart: unless-stopped
    depends_on:
      searxng-config:
        condition: service_completed_successfully
      valkey:
        condition: service_started
    expose:
      - "8080"
    networks:
      - coolify
    environment:
      SEARXNG_BIND_ADDRESS: 0.0.0.0
      SEARXNG_PORT: 8080
      SEARXNG_BASE_URL: ${SEARXNG_BASE_URL:-}
      SEARXNG_VALKEY_URL: valkey://valkey:6379/0
    volumes:
      - searxng-config:/etc/searxng
      - searxng-cache:/var/cache/searxng
    healthcheck:
      test:
        - CMD-SHELL
        - wget -q --spider http://127.0.0.1:8080/ || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  valkey:
    image: ghcr.io/valkey-io/valkey:9-alpine
    command: valkey-server --save 30 1 --loglevel warning
    restart: unless-stopped
    expose:
      - "6379"
    networks:
      - coolify
    volumes:
      - valkey-data:/data
    healthcheck:
      test:
        - CMD
        - valkey-cli
        - ping
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  searxng-config:
  searxng-cache:
  valkey-data:

networks:
  coolify:
    external: true
    name: ${COOLIFY_NETWORK:-coolify}
